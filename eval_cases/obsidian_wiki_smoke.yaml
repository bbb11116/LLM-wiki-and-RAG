cases:
  - id: workflow_ingest_dry_run
    type: workflow
    input: "请基于 raw/sample.md 进行 Ingest"
    expected:
      must_contain:
        - "Ingest dry-run plan"
      must_not_write:
        - "wiki/sources/sample.md"

  - id: workflow_query_rag_evidence
    type: workflow
    input: "AI Agent evaluation 讲了什么"
    expected:
      must_contain:
        - "## 候选依据页面"
        - "## RAG 证据片段"

  - id: rag_search_agent_eval
    type: rag_search
    input: "agent evaluation tool safety"
    scope: all
    top_k: 5
    expected:
      must_retrieve:
        - "raw/sample.md"
      must_contain:
        - "# RAG Search Results"

  - id: rag_answer_has_citation
    type: rag_answer
    input: "AI Agent evaluation measures what?"
    scope: all
    expected:
      must_cite: true
      must_contain:
        - "## 引用"

  - id: layered_answer_routes_and_cites
    type: layered_answer
    input: "AI Agent evaluation 是什么？"
    expected:
      must_cite: true
      must_contain:
        - "# Layered Knowledge Answer"
        - "## Route"
        - "## Citations"
